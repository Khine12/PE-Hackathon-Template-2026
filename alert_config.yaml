# Alert Configuration for PE Hackathon
alerts:
  service_down:
    description: "Service is unreachable or /health returns non-200"
    check_interval_seconds: 30
    threshold: 2  # Alert after 2 consecutive failures
    endpoint: "http://localhost:5000/health"

  high_error_rate:
    description: "Error rate exceeds 10% of requests"
    check_interval_seconds: 30
    threshold_percent: 10

notification:
